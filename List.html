<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Project Listing</title>
  <link rel="stylesheet" href="List.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script type="module">
  import { Web3Modal } from 'https://unpkg.com/@web3modal/standalone@2.4.3/dist/index.js'
  import { EthereumProvider } from 'https://unpkg.com/@walletconnect/ethereum-provider@2.12.1/dist/index.umd.js'
  window.Web3Modal = Web3Modal;
  window.EthereumProvider = EthereumProvider;
</script>
  <style>
    #bgVideo { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -2; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: -1; }
    .page { position: relative; z-index: 10; }
    /* Ensure WalletConnect modal is ALWAYS on top */
    wcm-modal { z-index: 99999 !important; position: relative; }
  </style>
</head>
<body>
  <video autoplay muted loop id="bgVideo">
    <source src="List/animatealpha.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>

  <main class="page">
    <form id="projectForm" class="card">
      <h2>Submit Your Project</h2>
      <div class="grid">
        <input placeholder="Project Name" required />
        <input placeholder="Project Symbol" required />
        <select required>
          <option value="">Select Chain</option>
          <option>Ethereum</option>
          <option>BNB Chain</option>
          <option>Polygon</option>
          <option>Arbitrum</option>
        </select>
        <input placeholder="Contract Address" required />
        <input placeholder="Total Supply" />
        <input placeholder="Circulating Supply" />
      </div>
      <textarea placeholder="Other necessary information"></textarea>
      <div class="grid">
        <input placeholder="Developer Name" required />
        <input type="email" placeholder="Developer Email" required />
      </div>
      <button type="submit" class="btn-primary">Submit</button>
    </form>
  </main>

  <div id="feeModal" class="modal hidden">
    <div class="modal-content">
      <span class="close">&times;</span>
      <p>A verification fee is required to list your project on The Void List.</p>
      <button id="proceedButton">Proceed to Payment</button>
    </div>
  </div>

  <div id="walletModal" class="modal hidden">
    <div class="modal-content">
      <span class="close">&times;</span>
      <p>Select your wallet:</p>
      <!-- EVM wallets -->
      <button id="metaMaskButton" class="wallet-btn hidden">MetaMask</button>
      <button id="walletConnectEvmButton" class="wallet-btn hidden">WalletConnect (EVM)</button>
      <!-- Solana wallets -->
      <button id="solanaWalletButton" class="wallet-btn hidden">Solana Wallets</button>
      <button id="walletConnectSolanaButton" class="wallet-btn hidden">WalletConnect (Solana)</button>
    </div>
  </div>

  <script src="List/script.js"></script>
</body>
</html>
