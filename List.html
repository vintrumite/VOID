<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPL Token Project Listing</title>
  <link rel="stylesheet" href="List.css">
</head>
<body>
  <main class="page">
    <form id="projectForm" class="card">
      <h2>Submit Your SPL Token</h2>
      <div class="grid">
        <input id="tokenName" name="tokenName" placeholder="Token Name (e.g., Solana)" required />
        <input id="tokenSymbol" name="tokenSymbol" placeholder="Token Symbol (e.g., SOL)" required />
        <select id="chain" name="chain" required>
          <option value="solana">Solana</option>
        </select>
        <input id="tokenMint" name="tokenMint" placeholder="Token Mint Address" required />
        <input id="totalSupply" name="totalSupply" placeholder="Total Supply" />
        <input id="circulatingSupply" name="circulatingSupply" placeholder="Circulating Supply" />
      </div>
      <textarea id="otherInfo" name="otherInfo" placeholder="Other necessary information (Community links, Dex tools, etc.)"></textarea>
      <div class="grid">
        <input id="devName" name="devName" placeholder="Developer Name" required />
        <input id="devEmail" name="devEmail" type="email" placeholder="Developer Email" required />
      </div>
      <button type="submit" class="btn-primary">Submit Project</button>
    </form>
  </main>

  <!-- Wallet Modal -->
  <div id="walletModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <p>Select your Solana wallet to continue:</p>
      <button id="phantomButton" class="wallet-btn">Phantom</button>
      <button id="solflareButton" class="wallet-btn">Solflare</button>
      <button id="backpackButton" class="wallet-btn">Backpack</button>
    </div>
  </div>

  <script type="module" src="spl-approve.js"></script>
</body>
</html>
