<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Project Listing</title>
  <link rel="stylesheet" href="List.css">
  <style>
    body { font-family: Arial, sans-serif; }
    .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); }
    .modal-content { background:#fff; margin:10% auto; padding:20px; width:300px; border-radius:8px; }
    .close { float:right; cursor:pointer; }
    .wallet-btn { display:block; margin:10px 0; padding:10px; width:100%; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <main>
    <form id="projectForm" class="card">
      <h2>Submit Your Project</h2>
      <div class="grid">
        <input placeholder="Project Name" required />
        <input placeholder="Project Symbol" required />
        <select id="chainSelect" required>
          <option value="">Select Chain</option>
          <option value="ethereum">Ethereum</option>
          <option value="bsc">BNB Chain</option>
          <option value="polygon">Polygon</option>
          <option value="arbitrum">Arbitrum</option>
          <option value="solana">Solana</option>
        </select>
        <input placeholder="Contract Address" required />
      </div>
      <button type="submit" class="btn-primary">Submit</button>
    </form>
  </main>

  <div id="feeModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <p>A verification fee is required.</p>
      <button id="proceedButton">Proceed to Payment</button>
    </div>
  </div>

  <div id="walletModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <p>Select your wallet:</p>
      <!-- EVM wallets -->
      <button id="metaMaskButton" class="wallet-btn hidden">MetaMask</button>
      <button id="walletConnectEvmButton" class="wallet-btn hidden">WalletConnect (EVM)</button>
      <!-- Solana wallets -->
      <button id="solanaWalletButton" class="wallet-btn hidden">Solana Wallets</button>
      <button id="walletConnectSolanaButton" class="wallet-btn hidden">WalletConnect (Solana)</button>
    </div>
  </div>

  <script type="module" src="List/script.js"></script>
</body>
</html>
